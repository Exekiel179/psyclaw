# PsyClaw 质量规则（机器可校验）。checker.py 在每个产出点执行。
# action: block（阻断并要求修复） | warn（警告并记审计日志）
gates:
  - id: STAT.effect_size
    trigger: stat_output
    requires: [effect_size, confidence_interval]
    action: block
    fix: 自动补算 Cohen's d / eta^2 / r 及 95% CI

  - id: STAT.assumptions
    trigger: before_test
    requires: [normality_check, homogeneity_check, independence_check]
    action: block
    fix: 提示稳健替代 Welch / 非参 / bootstrap

  - id: STAT.no_phack
    trigger: analysis
    forbids: [undeclared_multiple_comparison, selective_reporting, harking]
    action: warn

  - id: DESIGN.power
    trigger: experiment_design
    requires: [a_priori_power_analysis]
    action: block

  - id: DESIGN.prereg
    trigger: confirmatory_study
    requires_one_of: [preregistration, exploratory_label]
    action: block

  - id: WRITE.apa7
    trigger: paper_output
    requires: [apa7_citations, apa7_numbers, apa7_tables]
    action: block

  - id: LIT.prisma
    trigger: literature_review
    requires: [prisma_flow]
    action: warn

  - id: REPRO.script
    trigger: stat_conclusion
    requires: [repro_script, data_fingerprint]
    action: block

  - id: FIG.honest
    trigger: figure_output
    requires: [axis_from_zero_or_flagged, error_bar_meaning, colorblind_safe]
    action: block

  - id: DATA.careless
    trigger: data_screening
    requires: [careless_screen_run, exclusion_approved_by_human]
    action: block
    fix: 跑 psyclaw screen;剔除决定写 notes/decision_request.md 走人工审批

  - id: MEASURE.reliability
    trigger: scale_score_used
    requires: [reliability_reported]
    action: block
    fix: 合成量表分前必报信度(α,M2 后默认加报 ω);TIPI 类两题量表报重测信度

  - id: CLARIFY.complete
    trigger: research_start
    requires: [clarification_card_all_resolved]
    action: block
    fix: 运行 psyclaw clarify 完成全部 17 个研究准备项;notes/clarification.md 无 UNRESOLVED

  - id: DESIGN.evidence
    trigger: design_decision
    requires: [decision_has_citation]
    action: block
    fix: 决策台账每条决策须引用方法学文献(psyclaw cite 查背书库)或自补文献

  - id: STAT.rigor
    trigger: analysis_pipeline
    requires: [step1_data_quality, step2_descriptives, step4_diagnostics,
               step5_robustness_2plus, hedged_language]
    action: block
    fix: 按 gates/rigor.md 流程补齐;因果措辞须带识别假设限定

  - id: WRITE.jars
    trigger: paper_output
    requires: [jars_missing_data, jars_exclusions]
    action: block
    fix: 运行 psyclaw jars <draft.md> 检查 JARS 缺项;两项阻断须补后方可投稿

  - id: WRITE.citations
    trigger: citation_check
    requires: [no_fabricated_citations]
    action: block
    fix: 稿件文内引用须能溯源到检索命中(notes/evidence_map.json）。孤儿引用=疑似杜撰，删除或先 psyclaw lit 补检索；跑 psyclaw cite-check <稿件.md> 复核

  - id: REPRO.provenance
    trigger: provenance_check
    requires: [provenance_complete]
    action: block
    fix: 生成的脚本/图须带复现溯源(确切代码+环境+自然语言说明)；跑 psyclaw provenance <产物> 生成 <产物>.provenance.json

  - id: REPRO.replication_package
    trigger: provenance_check
    requires: [replication_package_declared]
    action: block
    fix: 该期刊 data_availability=required，须附 replication-package 声明；跑 psyclaw provenance <产物> --journal <期刊> --data <数据文件> 生成(非强制期刊不要求此项)

  - id: MEASURE.ethics
    trigger: scale_score_used
    requires: [ethics_reviewed]
    action: warn
    fix: 使用敏感量表前确认 IRB 批准并制定危机转介流程（psyclaw ethics <id> 查看伦理要求）

  - id: MEASURE.invariance
    trigger: latent_mean_comparison
    requires: [invariance_tested, scalar_invariance_met]
    action: block
    fix: 运行 psyclaw invariance <data.csv> --group <col> --model '...' 检验 configural→metric→scalar 不变性序列；scalar 不成立时改用 partial invariance 或删除潜均值比较

  - id: STAT.meta
    trigger: meta_analysis
    requires: [meta_heterogeneity_reported, meta_effect_ci_reported]
    action: block
    fix: 元分析结果必须报告 I²、τ²、Q 检验（异质性）和随机效应汇总效应量及 95% CI；运行 psyclaw meta <data.csv> 自动生成合规报告

  - id: STAT.equivalence
    trigger: equivalence_test
    requires: [equivalence_tested]
    action: block
    fix: 声称"无差异/等价/非劣效"时必须提供 TOST 等价检验证据；运行 psyclaw tost <data.csv> --dv <列> --group <组列> --lower <下界> --upper <上界>
