[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "psyclaw"
version = "0.1.0"
description = "心理学研究全流程 Agent CLI — 文献调研 · 实验设计 · 统计分析 · 论文写作，规范门禁内置"
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [{ name = "PsyClaw" }]

# 核心依赖（硬依赖，配置时安装）：成熟统计库栈——pingouin/scipy 为主干，
# statsmodels(回归族/GLM)、lifelines(生存)、factor_analyzer(EFA)、semopy(CFA/SEM)。
# 各分析模块直接调用这些库，不再手写或降级到 stdlib 统计实现。
dependencies = [
    "pingouin>=0.5",
    "pandas>=2.0",
    "numpy>=1.22",
    "scipy>=1.8",
    "statsmodels>=0.14",
    "lifelines>=0.27",
    "factor_analyzer>=0.4",
    "semopy>=2.3",
]

[project.optional-dependencies]
viz = ["seaborn", "matplotlib"]
full = ["pyyaml", "rich", "prompt_toolkit", "mcp"]
embed = ["model2vec"]  # 本地语义嵌入(纯 numpy 静态模型);未装时召回用内置哈希向量兜底

[project.scripts]
psyclaw = "psyclaw.cli:main"

[tool.setuptools.packages.find]
include = ["psyclaw*"]
